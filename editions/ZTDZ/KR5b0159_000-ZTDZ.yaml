front:
  text: 洪恩靈濟眞君七政星燈儀
  hash: sha256:66c6bea1678c6a41ef166afda6ec1efa5cf2d58fe7ed50322b938deba1e263f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0159_SJB_000-090039a, image: sjb/09/090039a.png}
body:
  text: 法事如式大道昭昭不言善應小心翼翼有禱必通恭炷眞香䖍誠供養九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君靈濟宫中神仙諸靈官普同供養恭聞龍漢開圖而玄元始之炁分鼇極初化而天地人之位定夫人也大道難遇中土難生況抱以陽負以隂四肢旣正必貴其形保其命萬氣長存惟恐老死病苦之爲憂各以長大羙好而自恱人有所欲天無私親何賜也富而憲也貧何彭之壽而顔之夭母誘之數盍求諸身爾時靈濟眞君遊宴玉清聖境熈帝之載則天之明作大因縁爲衆演說五辰我撫或盈或縮之不常兩曜我經一暑一寒之有序順之則爲吉隆之喜逆之則爲凶危之憂惟至誠可以感神故積善必有餘慶旣沐照臨之下敢忘昭謝之私今辰謹有奉道某恭啓靈壇具陳菲供依元陽之玉曆行香誦經按靈寳之金科修齋奉戒發明章典然㸃神燈仰觀經緯之文遐想璣衡之象蘭炷𤑔火見其盛未見其微鐵盆盛膏見其増未見其减上照三十二天光明廓落下使百千萬人瞻仰皈依衆善自光中生衆惡自光中滅一作禮而再作禮精意感孚初上香至三上香玉音嘹亮仰惟洞鑒俯陽恩光更冀三界齊臨萬神恭諾凶星退舍在四時則無害無災吉曜臨軒鍚五福以曰富曰壽稽首皈依至眞妙道德光常曜天尊臣法衆等志心皈命九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君靈濟宫中神仙諸靈官謹然璣衡七政神燈上布日曜太陽之象恭聞道在太極之始莫見乎隱莫顯乎微日者衆陽所宗無願不成無幽不察莫測其妙所存者神赫赫厥靈人可畏之如趙盾明明在上民皆仰之若周公輝光其德盛矣乎㓗白其節皎如也烏輪肅備朝覲鬱儀之宫羲駕莊嚴燕享洞陽之殿放出毫光萬丈普照世界三千入吾門也無蔀屋之疑遵吾道也滅索塗之病伏念一切衆生塵埃汨没徒窮逐影之勞電露虚華惟有過隙之歎自今及照與道常明伏願中爲市者獲行商坐費之財出而作之安耕田鑿井之業藝之巧者以圭測影工之勤者繼晷焚膏爲儒者賦誇五色文章入仕者名號八磚學士桑榆殘照爭同松栢以長青螢燐増輝願與昆蟲而被澤少竭葵傾之敬願垂藻鑑之光請法衆等敬依太上所說太陽帝君神呪稽首皈依䖍誠讃詠志心皈命信禮九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君志心皈命信禮九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君呪捻午文吸午氣遥想洞陽鬱儀宫眞君如在東望扶桑宫稽首朝鬱儀太陽洞明景寥寥何所思令我拜金色候天望英姿皇華將玉女臨軒降此時和願此燈光回向眞君散花大明圓極天尊臣法衆等志心皈命九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠鋪國佑民洪恩眞君靈濟宫中神仙諸靈官謹然璣衡七政神燈上布月曜太隂之象恭聞祖氣在太空之中無色無緒月𩲸泛十華之彩有性有情經於箕而起風離於畢而作雨天之工也神而明之歩蟾宫八萬三千門清光可挹眺鶴臺一千五百載聖迹猶存劉越石之却虜圍果遂登樓之興曹孟德之成覇業何妨鼓瑟而歌或淪精而授漢之符或委照而應吳之瑞其名清亮厥績彰明伏念一切衆生穴影偷光塵籠養晦將長護短豈無玷缺之愆文過飾非未免朦朧之罪謹當昭謝幸覩光明伏願鴻集澤中安有烏飛之恐雞鳴境内永無牛喘之憂搗兎藥者可以長生採蚌珠者可以獲冨入仕者早中嫦娥之選定婚者果符老人之言瑶光現而孕産佳兒玉斧修而工精藝巧拱俟纎阿而按晷自慚太白之舉杯請法衆等謹依太上所說太隂皇君神呪稽首皈依䖍誠讃詠志心皈依信禮九天金闕明道逹德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君志心皈依信禮九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君冗捻未文吸未氣想洞隂結璘之宫眞君如在仰望顧八表惟月孕隂精中有太素皇夫人駕緑軿耀華光二極混明照三清般勤求至道五色下來迎和願此燈光回向眞君散花圓鑒洞照天尊臣法衆等志心皈命九天金闕明道逹德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君靈濟宫中神仙諸靈宫謹然璣衡七政神燈上布東方木德歳星之象恭聞道心惟一昏昏嘿嘿以難名木神則仁化化生生之爲妙在時爲春而春風長養於德爲元而元氣胚胎均蒙扶植之功猶頼剸裁之力髙山仰止易地皆然謝石得之顯八公之靈周公得之以釋金縢之謗調梅用說則夢求諸野採桑得尹則神降於莘功卓立於一時名流芳於萬世伏念一切衆生守株安分托蔭過情雖樗櫟之才搥魯無文然𣏌栁其性杯棬可用從繩則正非矩不成伏願能官者棫樸其章聽訟者甘棠其政觀橋梓之道而父慈子孝歌華萼之詩而兄友弟恭生子願爲聖小兒挺挺五枝之桂結交須作忘年友森森千歳之松桃灼其華冝其家冝其室果秋以薦尊爾祖敬爾宗少伸實之儀非擬燔柴之典請法衆等敬依太上所說木德星君神呪稽首皈依䖍誠讃詠志心皈依信禮九天金闕明道逹德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君志心皈依信禮九天玉闕宣化扶敎上仙昭靈溥濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君呪捻寅亥文取寅亥氣想青華青天之宫眞君如在歳星乗木德展轉耀東郷凌天姿潤澤正色滉明皇㝷花歌浩漾擲水詠芝房經時頻禱禮獲福自然長和願此燈光回向眞君散花妙智圓明天尊臣法衆等志心皈命九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君靈濟宫中神仙諸靈官謹然璣衡七政神燈上布南方火德熒惑星之象恭䦘火秉南方之德炎帝行權神爲東海之君眞人鍚號玉精鑄魄金液煉形學叅方外之書善似光中之影隨機應化發誓度人挈塗炭之民而置諸袵席之安憫焦熬之俗而轉爲謳歌之樂以勞定國則流烏呈瑞捍難禦灾則回禄反風聲迹熒煌威靈烜赫伏念一切衆生慾心未滅道學不明其徇勢則未免阿佞以趨炎其措謀則豈敢險奸而煽毒揚湯止沸何其愚也収燼之餘不幾晚乎幸曲突徙薪猶有豫防之戒然紅爐㸃雪㑹知解悟之機憂甚如熏誰能執熱曽謂燎原而可撲豈冝與玉以俱焚伏願戢我干戈永絕狼烽之警救民疾苦何勞艾灸之功烹炊者得養其生樵㸑者各安其業惟天鑒于一德故曰誠則明明則誠作善降之百祥俾爾熾而昌昌而熾心香一炷可通於碧落神光三燭載顯於靈壇請法衆等敬依太上所說火德星君神呪稽首皈依䖍誠讃詠志心皈命信禮九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君志心皈命信禮九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君呪捻卯戍文取卯戍氣想朱陵火煉之宫眞君如在芒角生龍鳳威光叱十方丹剛耀五夜朱火熖三邊晶明符正氣劒㦸煥兵權搶應滅迹孛彗敢當前和願此燈光回向眞君散花智炬赫奕天尊臣法衆等志心皈命九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君靈濟宫中神仙諸靈官謹然璣衡七政神燈上布西方金德太白之象恭聞金孕太白之情西方有象神位上清之列北斗化形文章久著於天台源𣲖其來於麗水歌詩雅頌有鏗鏘之羙勒銘鍾鼎負剛介之才李少君因此以成丹商傳說用之而作礪其爲寳也誠可貴其爲器也寧可輕仰之彌髙鑚之彌堅截然有條渾然有理伏念一切衆生四知有愧素欽楊震之賢三致無能空羡陶朱之富過自今而湔改誠有頼於陶鎔伏願經果不焚喜得滿籝之敎文如未䘮猶聞擲地之聲言可行名可言楚人之諾皆如季布聖希天賢希聖孔子之鑄豈特顔回愧無鴻寳之陳略具彜樽之獻請法衆等敬依太上所說金德星君神呪稽首皈依䖍誠讃詠志心皈依信禮九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君志心皈依信禮九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君呪捻辰酉文取辰酉氣想金天素靈之宫眞君如在太白凌清漢騰霜耀素英亭亭浮瑞彩皎皎盛長庚鋒髙能禦㓂色潤毎降兵推窮符暦數合道與長生和願此燈光回向眞君散花明眞養皓天尊臣法衆等志心皈命九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠謹國庇民洪恩眞君九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君靈濟宫中神仙諸靈官謹然璣衡七政神燈上布北方水德辰星之象恭聞水之神故曰玄㝠其源也深其流也逺神如水之在地下何所不至何往不通蕩蕩乎吾無能名淵淵乎誠不可測言其仁則魚鰲得其所言其威則蛟龍神其靈飛沙怒濤曽顯三山之夢興雲致雨具瞻四瀆之祠氷渡滹沱王覇之言何其神也雪平淮蔡李愬之功豈非天乎均蒙潤下之仁敢有朝東之請伏念一切衆生盜泉止渴何饕餮之不才濁渭常流使穢汚而自臭謹當洗濯毋即慆滛伏願官府昇平珠果還於合浦人才泰長舟可濟於巨川泮林之桑熟而蠶乃登潢池之劒賣而牛可畜財利之源淵積旣庶何加又曰富之子孫之𣲖流長盛德之後必有興者恩波洋溢福海弘深少伸行潦之儀深愧蹄涔之陋請法衆等敬依太上所說水德星君神呪稽首皈依䖍誠讃詠志心皈依信禮九天金闕明道逹德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君志心皈依信禮九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君呪捻巳申文取巳申氣想玄靈大德之宫眞君如在妙哉符五氣髣髴見眞門嵳峩當丑位壬癸洞靈君分輝凝皎㓗肹蠁赴思存仙歌將舞道良久下金天和願此燈光回向眞君散花龍德普照天尊臣法衆等志心皈命九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君靈濟宫中神仙諸靈官謹然璣衡七政神燈上布中央土德鎭星之象恭聞社而祭土配地之宜神之爲德合天之道石文薦瑞隂克相於唐家野塊呈祥神有扶於晋室秦如得蜀則褒谷之妖不足爲怪劉旣吞桓則鮮卑之夢夫豈偶然宗孝子以此葬父而顯隂功鐵輪王以此施佛而成因果洪䂓之船可以借重盧江德政萬古流傳雷煥之劒可以増光華隂聖迹千年如在以沙漬酒曽授髙府君療病之方取塵爲圓嘗得葛仙翁活人之劑以黃尚德有赫厥靈伏念一切衆生穴蟻偷生壁蟲守拙惡多善少豈無一簣之虧彰往知來未免百昌之托靖惟糞壤無所用也或者泥塗其可棄乎從今正道以由行敢不立墻而起敬伏願華嶽儲精爲士者生而頴悟黃金同價爲商者冨而貿遷墁藝精而工食其功膏脉動而農力於穡編鍾擊磬略陳桴鼓之儀酌水獻花愧乏青藜之貢請法衆等敬依太上所說土德星君神呪稽首皈依䖍誠讃詠志心皈依信禮九天金闕明道達德大仙顯靈溥濟清微洞玄冲虚妙感慈惠護國庇民洪恩眞君志心皈依信禮九天玉闕宣化扶敎上仙昭靈博濟髙明弘靜冲湛妙應仁惠輔國佑民洪恩眞君呪捻子丑文取子丑氣想黄中元氣之宫奠君如在髙穹符戊已藏陸起重霄五行尊暗曜九土見光昭甘石推留伏陶巫筭泬寥上仙垂雨露伏地禮空謡和願此燈光回向眞君散花靈光炳曜天尊誦詠經呪上來然燈功德並巳周圓恭聞覩天文而察人事可以前知修人事以應天文吉無不利須仗神燈而㸃照特慿科典以宣揚回向眞君仰祈景貺自今巳後丕闡厥靈伏願星聚於奎再覩文明之治光含於璧復還淳古之風上體天心下孚民望更冀然燈之後五星順度兩曜増輝寒暑不愆躋兆民於仁壽雨暘時若祈百榖之豐登蠢動含靈咸資化育仰慿法衆爲上良縁念壹九十三三清三境天尊九天鍚慶天尊十方靈寳天尊不可思議功德洪恩靈濟眞君七政星燈儀
